name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch: # allow manual runs from the GitHub Actions UI

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Enables multi-platform builds and advanced caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Requires secrets: DOCKERHUB_USERNAME and DOCKERHUB_TOKEN
      # Add them at: repo → Settings → Secrets and variables → Actions
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.BUrBaKy }}
          password: ${{ secrets.dckr_pat_cTFL3cYjgVlpLScT3JcTd8O_zrk }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            burbaky/timber-joint:latest
            burbaky/timber-joint:${{ github.sha }}
          # GitHub Actions cache — speeds up repeated builds significantly
          cache-from: type=gha
          cache-to: type=gha,mode=max
